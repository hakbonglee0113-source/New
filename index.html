// 음성입력 버튼: 누르면 듣고, 텍스트를 onResult로 전달 (기존 값 뒤에 이어붙임)
function VoiceButton({ onResult, compact }) {
  const [listening, setListening] = useState(false);
  const recRef = useRef(null);
  const start = () => {
    const SR = window.webkitSpeechRecognition || window.SpeechRecognition;
    if (!SR) { alert("이 브라우저는 음성입력을 지원하지 않습니다. Chrome 브라우저를 사용해주세요."); return; }
    if (listening) { recRef.current?.stop(); return; }
    const rec = new SR();
    rec.lang = "ko-KR";
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    rec.onresult = (e) => { onResult(e.results[0][0].transcript); };
    rec.onerror = () => setListening(false);
    rec.onend = () => setListening(false);
    recRef.current = rec;
    setListening(true);
    rec.start();
  };
  return (
    <button type="button" onClick={start}
      className={`shrink-0 flex items-center justify-center rounded-full border transition-colors ${compact ? "w-8 h-8" : "w-9 h-9"} ${
        listening ? "bg-red-600 border-red-600 text-white pulse" : "bg-white border-stone-300 text-stone-500 hover:border-emerald-400 hover:text-emerald-600"
      }`} title="음성입력">
      <MicIcon size={compact ? 14 : 16} />
    </button>
  );
}

// ---------- 이미지 압축 (10장 저장을 위해 용량 최적화) ----------
function compressImage(dataUrl, maxDim = 1280, quality = 0.6) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (width > maxDim || height > maxDim) {
        if (width > height) { height = Math.round((height * maxDim) / width); width = maxDim; }
        else { width = Math.round((width * maxDim) / height); height = maxDim; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      canvas.getContext("2d").drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

// ---------- GPS 추출 ----------
// 1차: 직접 작성한 파서 (대용량 파노라마 파일에서 exifr이 깨지는 버그를 우회하기 위해
//      실제 27MB 갤럭시 파노라마 원본 파일의 바이트를 파이썬으로 직접 검증한 뒤 이식한 로직)
// 2차: exifr 라이브러리 (1차가 실패한 경우의 폴백, HEIC 등 다른 포맷 대응)

function readGPSFromTiff(view, tiffOffset, trace) {
  const little = view.getUint16(tiffOffset) === 0x4949;
  const g16 = (o) => view.getUint16(o, little);
  const g32 = (o) => view.getUint32(o, little);
  const ifd0Offset = tiffOffset + g32(tiffOffset + 4);
  const numEntries = g16(ifd0Offset);
  if (trace) trace.push(`little=${little} ifd0Offset=${ifd0Offset} numEntries=${numEntries}`);
  let gpsIfdOffset = null;
  for (let i = 0; i < numEntries; i++) {
    const eo = ifd0Offset + 2 + i * 12;
    const tagHere = g16(eo);
    if (trace) trace.push(`  IFD0 entry[${i}] offset=${eo} tag=0x${tagHere.toString(16)}`);
    if (tagHere === 0x8825) { gpsIfdOffset = tiffOffset + g32(eo + 8); break; }
  }
  if (trace) trace.push(`gpsIfdOffset=${gpsIfdOffset}`);
  if (gpsIfdOffset === null) return null;
  const gpsEntries = g16(gpsIfdOffset);
  if (trace) trace.push(`gpsEntries=${gpsEntries}`);
  const tags = {};
  for (let i = 0; i < gpsEntries; i++) {
    const eo = gpsIfdOffset + 2 + i * 12;
    const tag = g16(eo), type = g16(eo + 2), count = g32(eo + 4);
    if (trace) trace.push(`  GPS entry[${i}] eo=${eo} tag=${tag} type=${type} count=${count}`);
    if (type === 2) {
      tags[tag] = String.fromCharCode(view.getUint8(eo + 8));
    } else if (type === 5) {
      const dataOff = count * 8 > 4 ? tiffOffset + g32(eo + 8) : eo + 8;
      const vals = [];
      for (let j = 0; j < count; j++) {
        const num = g32(dataOff + j * 8);
        const den = g32(dataOff + j * 8 + 4);
        vals.push(den === 0 ? 0 : num / den);
      }
      tags[tag] = count === 1 ? vals[0] : vals;
      if (trace) trace.push(`    dataOff=${dataOff} vals=${JSON.stringify(vals)}`);
    } else {
      if (trace) trace.push(`    (처리 안 하는 type=${type}, 건너뜀)`);
    }
  }
  if (trace) trace.push(`tags=${JSON.stringify(tags)}`);
  if (!tags[2] || !tags[4]) return null;
  const toDec = (dms, ref) => {
    const d = Array.isArray(dms) ? dms[0] + dms[1] / 60 + dms[2] / 3600 : dms;
    return ref === "S" || ref === "W" ? -d : d;
  };
  const lat = toDec(tags[2], tags[1] || "N");
  const lng = toDec(tags[4], tags[3] || "E");
  if (!isFinite(lat) || !isFinite(lng)) return null;
  // (0,0)은 대서양 한가운데(Null Island)로, 실제 GPS일 가능성이 사실상 없음.
  // 파일을 제대로 못 읽었을 때(빈 버퍼 등) 계산상 0이 나오는 경우를 거르기 위한 안전장치.
  if (lat === 0 && lng === 0) return null;
  const altitude = typeof tags[6] === "number" && isFinite(tags[6]) ? tags[6] : null;
  return { lat, lng, altitude };
}

function findTiffOffsetInBuffer(view) {
  // JPEG: APP1/Exif 세그먼트
  if (view.getUint16(0) === 0xffd8) {
    let offset = 2;
    while (offset < view.byteLength - 4) {
      const marker = view.getUint16(offset);
      if (marker === 0xffe1) {
        const exifOffset = offset + 4;
        if (view.getUint32(exifOffset) === 0x45786966) return exifOffset + 6;
        return null;
      }
      if ((marker & 0xff00) !== 0xff00) break;
      offset += 2 + view.getUint16(offset + 2);
    }
    return null;
  }
  // WebP: RIFF 컨테이너 안의 EXIF 청크
  if (view.getUint32(0, false) === 0x52494646 && view.getUint32(8, false) === 0x57454250) {
    let offset = 12;
    while (offset + 8 <= view.byteLength) {
      const fourCC = String.fromCharCode(view.getUint8(offset), view.getUint8(offset + 1), view.getUint8(offset + 2), view.getUint8(offset + 3));
      const chunkSize = view.getUint32(offset + 4, true);
      const dataStart = offset + 8;
      if (fourCC === "EXIF") {
        if (view.getUint32(dataStart, false) === 0x45786966) return dataStart + 6;
        return dataStart;
      }
      offset = dataStart + chunkSize + (chunkSize % 2);
    }
    return null;
  }
  return null;
}

async function getGPSFromFile(file) {
  let readIssue = false;
  // 1차: 직접 파서
  try {
    const buf = await file.arrayBuffer();
    if (buf.byteLength === 0 || (file.size > 1000 && buf.byteLength < file.size * 0.5)) {
      readIssue = true; // 파일 크기 대비 실제로 읽힌 바이트가 너무 적음 -> 환경 문제 의심
    }
    const view = new DataView(buf);
    const tiffOffset = findTiffOffsetInBuffer(view);
    if (tiffOffset !== null) {
      const result = readGPSFromTiff(view, tiffOffset);
      if (result) return result;
    }
  } catch {
    readIssue = true;
  }

  // 2차: exifr 폴백
  try {
    const output = await exifr.parse(file, { chunked: false, gps: true, translateValues: true, reviveValues: true });
    if (output && typeof output.latitude === "number" && isFinite(output.latitude) && typeof output.longitude === "number" && isFinite(output.longitude) && !(output.latitude === 0 && output.longitude === 0)) {
      const altitude = typeof output.GPSAltitude === "number" && isFinite(output.GPSAltitude) ? output.GPSAltitude : null;
      return { lat: output.latitude, lng: output.longitude, altitude };
    }
  } catch {
    readIssue = true;
  }

  return readIssue ? { readIssue: true } : null;
}

// ---------- 약도: 표준 OpenStreetMap 타일을 직접 사용 (불안정한 외부 staticmap 서비스 대신) ----------
function latLonToTile(lat, lon, zoom) {
  const latRad = (lat * Math.PI) / 180;
  const n = Math.pow(2, zoom);
  const xExact = ((lon + 180) / 360) * n;
  const yExact = ((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2) * n;
  const x = Math.floor(xExact);
  const y = Math.floor(yExact);
  return { x, y, pxX: (xExact - x) * 256, pxY: (yExact - y) * 256 };
}
function osmTileUrl(lat, lon, zoom = 16) {
  const { x, y } = latLonToTile(lat, lon, zoom);
  return `https://tile.openstreetmap.org/${zoom}/${x}/${y}.png`;
}
function osmMarkerPx(lat, lon, zoom = 16) {
  const { pxX, pxY } = latLonToTile(lat, lon, zoom);
  return { left: pxX, top: pxY };
}
// ---------- IndexedDB 영속화 (localStorage 대비 훨씬 큰 용량) ----------
const DB_NAME = "fieldSurveyDB";
const DB_VERSION = 1;
const STORE_NAME = "records";

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: "id" });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function loadRecords() {
  try {
    const db = await openDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readonly");
      const store = tx.objectStore(STORE_NAME);
      const req = store.getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  } catch { return []; }
}

async function saveRecord(record) {
  try {
    const db = await openDB();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readwrite");
      tx.objectStore(STORE_NAME).put(record);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
    return true;
  } catch { return false; }
}

async function deleteRecordFromDB(id) {
  try {
    const db = await openDB();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readwrite");
      tx.objectStore(STORE_NAME).delete(id);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
    return true;
  } catch { return false; }
}

function RecordEditor({ record, onChange, onBack }) {
  const [openSection, setOpenSection] = useState("basic");
  const [error, setError] = useState("");
  const [debugInfo, setDebugInfo] = useState("");
  const [zipLoading, setZipLoading] = useState(false);

  const runDebugCheck = async (file) => {
    setDebugInfo("확인 중...");
    const lines = [];
    lines.push(`파일명: ${file.name}`);
    lines.push(`타입: ${file.type || "(알 수 없음)"}`);
    lines.push(`크기: ${(file.size / 1024 / 1024).toFixed(2)} MB`);

    // 0순위: 실제 업로드 시 쓰이는 것과 100% 동일한 함수를 그대로 호출
    lines.push("");
    lines.push("=== ★ 실제 앱이 쓰는 함수(getGPSFromFile) 결과 ★ ===");
    try {
      const actual = await getGPSFromFile(file);
      lines.push(JSON.stringify(actual));
    } catch (e) {
      lines.push(`에러: ${e.message}`);
    }

    // 자체 파서만 단독으로도 확인 (exifr 폴백 없이)
    lines.push("");
    lines.push("=== 자체 파서 단독 (findTiffOffsetInBuffer + readGPSFromTiff) ===");
    try {
      const buf2 = await file.arrayBuffer();
      lines.push(`arrayBuffer 읽은 크기: ${buf2.byteLength} (파일 크기: ${file.size}, 일치: ${buf2.byteLength === file.size})`);
      const view2 = new DataView(buf2);
      const t2 = findTiffOffsetInBuffer(view2);
      lines.push(`tiffOffset: ${t2}`);
      if (t2 !== null) {
        const trace = [];
        const r2 = readGPSFromTiff(view2, t2, trace);
        lines.push("--- 단계별 추적 ---");
        lines.push(...trace);
        lines.push(`최종 결과: ${JSON.stringify(r2)}`);
      }
    } catch (e) {
      lines.push(`자체 파서 에러: ${e.message}`);
    }

    try {
      const buf = await file.slice(0, 16).arrayBuffer();
      const bytes = new Uint8Array(buf);
      const hex = Array.from(bytes).map((b) => b.toString(16).padStart(2, "0")).join(" ");
      lines.push(`첫 16바이트(hex): ${hex}`);
    } catch (e) {
      lines.push(`바이트 읽기 실패: ${e.message}`);
    }
    try {
      const chunkedResult = await exifr.parse(file, { chunked: true, gps: true, tiff: true, ifd0: true, translateValues: true, reviveValues: true });
      const fullResult = await exifr.parse(file, { chunked: false, gps: true, tiff: true, ifd0: true, translateValues: true, reviveValues: true });
      const rawResult = await exifr.parse(file, { chunked: false, gps: true, translateValues: false, reviveValues: false });

      lines.push("");
      lines.push("=== chunked:true (기본값) 결과 ===");
      lines.push(chunkedResult ? JSON.stringify(chunkedResult, (k, v) => (typeof v === "number" && !isFinite(v) ? String(v) : v), 2) : "결과 없음");

      lines.push("");
      lines.push("=== chunked:false (전체파일 강제읽기) 결과 ===");
      lines.push(fullResult ? JSON.stringify(fullResult, (k, v) => (typeof v === "number" && !isFinite(v) ? String(v) : v), 2) : "결과 없음");

      lines.push("");
      lines.push("=== 가공 없는 raw 값 (translateValues/reviveValues 끔) ===");
      lines.push(rawResult ? JSON.stringify(rawResult, (k, v) => (typeof v === "number" && !isFinite(v) ? String(v) : v), 2) : "결과 없음");
    } catch (e) {
      lines.push(`exifr 파싱 에러: ${e.message}`);
    }
    setDebugInfo(lines.join("\n"));
  };

  const update = (patch) => onChange({ ...record, ...patch });
  const updateGrowth = (stage, val) => onChange({ ...record, growthStageCounts: { ...record.growthStageCounts, [stage]: val } });
  const updateThreat = (level, val) => onChange({ ...record, threats: { ...record.threats, [level]: val } });
  const updateCoOccurring = (idx, field, val) => {
    const list = [...record.coOccurring];
    list[idx] = { ...list[idx], [field]: val };
    onChange({ ...record, coOccurring: list });
  };
  const addCoOccurring = () => onChange({ ...record, coOccurring: [...record.coOccurring, { name: "", count: "" }] });
  const removeCoOccurring = (idx) => onChange({ ...record, coOccurring: record.coOccurring.filter((_, i) => i !== idx) });

  const processOnePhoto = useCallback(async (file) => {
    const rawDataUrl = await new Promise((res) => { const r = new FileReader(); r.onload = (e) => res(e.target.result); r.readAsDataURL(file); });
    const compressed = await compressImage(rawDataUrl);
    const newPhoto = { id: uid(), dataUrl: compressed, name: file.name };
    onChange((prev) => ({ ...prev, photos: [...prev.photos, newPhoto] }));

    const gps = await getGPSFromFile(file);
    if (gps && gps.readIssue) {
      setError((prev) => prev || "사진 파일을 제대로 읽지 못했습니다. 이건 사진 자체보다는 현재 이 페이지를 연 방식(브라우저/환경) 문제일 가능성이 높습니다. 파일관리자에서 html 파일을 길게 눌러 'Chrome으로 열기'를 선택했는지 다시 확인해주세요.");
    } else if (gps) {
      onChange((prev) => {
        const prevLat = parseFloat(prev.latMeasured);
        const prevLng = parseFloat(prev.lngMeasured);
        const prevValid = prev.latMeasured && prev.lngMeasured && (prevLat !== 0 || prevLng !== 0);
        if (prevValid) return prev; // 사람이 직접 입력했거나 이미 유효한 좌표가 있으면 보존
        return { ...prev, latMeasured: gps.lat.toFixed(6), lngMeasured: gps.lng.toFixed(6), coordSource: "GPS",
          altitude: gps.altitude ? String(Math.round(gps.altitude)) : prev.altitude };
      });
    } else {
      setError((prev) => prev || "이 사진에서 유효한 GPS 좌표를 읽지 못했습니다. 위치정보 섹션에서 직접 입력해주세요. (안드로이드가 사진 선택 시 GPS를 자동으로 지우는 경우가 있습니다 — ZIP으로 업로드하면 보존됩니다)");
    }
  }, [onChange]);

  const handleFiles = useCallback(async (files) => {
    setError("");
    const arr = Array.from(files).slice(0, 10 - record.photos.length);
    if (arr.length === 0) { setError("사진은 야장당 최대 10장까지 저장됩니다."); return; }
    for (const file of arr) {
      await processOnePhoto(file);
    }
  }, [record.photos.length, processOnePhoto]);

  const handleZipFile = useCallback(async (zipFile) => {
    setError("");
    setZipLoading(true);
    try {
      const zip = await JSZip.loadAsync(zipFile);
      const entries = Object.values(zip.files).filter(
        (f) => !f.dir && /\.(jpe?g|png|webp|heic)$/i.test(f.name)
      );
      if (entries.length === 0) {
        setError("zip 안에서 사진 파일을 찾지 못했습니다.");
        setZipLoading(false);
        return;
      }
      const remain = 10 - record.photos.length;
      const toProcess = entries.slice(0, remain);
      if (entries.length > remain) {
        setError(`zip 안에 사진이 ${entries.length}장 있지만, 야장당 최대 10장 제한으로 ${remain}장만 추가했습니다.`);
      }
      for (const entry of toProcess) {
        const blob = await entry.async("blob");
        const ext = entry.name.split(".").pop().toLowerCase();
        const mime = ext === "png" ? "image/png" : ext === "webp" ? "image/webp" : "image/jpeg";
        const file = new File([blob], entry.name.split("/").pop(), { type: mime });
        await processOnePhoto(file);
      }
    } catch (e) {
      setError("zip 파일을 여는 데 실패했습니다: " + e.message);
    } finally {
      setZipLoading(false);
    }
  }, [record.photos.length, processOnePhoto]);

  const removePhoto = (id) => onChange({ ...record, photos: record.photos.filter((p) => p.id !== id) });

  const keys = Object.keys(record).filter((k) => !["id", "createdAt", "photos", "status", "growthStageCounts", "threats", "coOccurring"].includes(k));
  const filled = keys.filter((k) => record[k] && record[k] !== "").length;
  const completeness = Math.round((filled / keys.length) * 100);

  return (
    <div className="min-h-screen bg-stone-50 pb-10">
      <header className="sticky top-0 z-20 bg-stone-900 text-stone-50 px-4 py-3">
        <div className="flex items-center justify-between">
          <button onClick={onBack} className="flex items-center gap-1 text-stone-300 text-[12.5px]"><ChevLeftIcon size={16} /> 목록</button>
          <div className="text-right">
            <div className="text-[11px] text-stone-400">작성률</div>
            <div className="text-[14px] font-mono font-semibold text-emerald-400">{completeness}%</div>
          </div>
        </div>
        <h1 className="text-[14.5px] font-semibold mt-1 truncate">{record.speciesNameKR || "새 야장"}</h1>
      </header>

      <main className="max-w-md mx-auto px-4 pt-4">
        <section className="bg-white rounded-xl border border-stone-200 p-3 mb-4">
          <div className="flex items-center justify-between mb-2">
            <h2 className="text-[13px] font-semibold text-stone-700">현장 사진</h2>
            <span className="text-[11px] text-stone-400">{record.photos.length}/10</span>
          </div>
          <div className="flex gap-2 overflow-x-auto pb-1">
            {record.photos.map((p) => <PhotoTile key={p.id} photo={p} onRemove={() => removePhoto(p.id)} />)}
            {record.photos.length < 10 && (
              <label className="w-20 h-20 shrink-0 rounded-lg border-2 border-dashed border-stone-300 flex flex-col items-center justify-center text-stone-400 hover:border-emerald-500 hover:text-emerald-600 transition-colors cursor-pointer">
                <CameraIcon size={20} />
                <span className="text-[10px] mt-1">추가</span>
                <input type="file" accept="image/*" multiple className="hidden" onChange={(e) => e.target.files && handleFiles(e.target.files)} />
              </label>
            )}
          </div>
          {error && (
            <div className="flex items-start gap-1.5 mt-2 text-[12px] text-red-600 bg-red-50 rounded-lg px-2.5 py-2">
              <AlertIcon size={14} className="shrink-0 mt-0.5" />{error}
            </div>
          )}

          {record.photos.length < 10 && (
            <label className={`flex items-center justify-center gap-1.5 w-full mt-2 border border-dashed rounded-lg py-2 text-[12px] cursor-pointer transition-colors ${
              zipLoading ? "border-stone-200 text-stone-300" : "border-emerald-300 text-emerald-700 hover:bg-emerald-50"
            }`}>
              {zipLoading ? (
                <><Icon d="M21 12a9 9 0 1 1-6.219-8.56" size={13} className="spin" /> zip 푸는 중...</>
              ) : (
                <>📦 ZIP으로 일괄 업로드 (GPS 보존)</>
              )}
              <input type="file" accept=".zip" className="hidden" disabled={zipLoading}
                onChange={(e) => e.target.files?.[0] && handleZipFile(e.target.files[0])} />
            </label>
          )}
          <p className="text-[10px] text-stone-400 mt-1 leading-snug">
            안드로이드는 사진 선택창에서 GPS를 자동으로 지우는 경우가 많습니다. 파일관리자에서 사진들을 zip으로 압축한 뒤 여기로 올리면 GPS가 보존됩니다.
          </p>

          <details className="mt-3 border-t border-stone-100 pt-2">
            <summary className="text-[11px] text-stone-400 cursor-pointer select-none">🔧 디버그: 사진 원본 EXIF 직접 확인</summary>
            <div className="mt-2">
              <label className="inline-flex items-center gap-1.5 text-[11.5px] text-emerald-700 bg-emerald-50 px-2.5 py-1.5 rounded-lg cursor-pointer">
                사진 선택해서 EXIF 원본 보기
                <input type="file" accept="image/*" className="hidden" onChange={(e) => e.target.files?.[0] && runDebugCheck(e.target.files[0])} />
              </label>
              {debugInfo && (
                <pre className="mt-2 text-[10px] bg-stone-900 text-emerald-300 rounded-lg p-2.5 overflow-x-auto whitespace-pre-wrap break-all max-h-64 overflow-y-auto">{debugInfo}</pre>
              )}
            </div>
          </details>
        </section>

        {SECTIONS.map((sec) => (
          <section key={sec.key} className="bg-white rounded-xl border border-stone-200 mb-3 overflow-hidden">
            <button onClick={() => setOpenSection(openSection === sec.key ? "" : sec.key)} className="w-full flex items-center justify-between px-3.5 py-3">
              <span className="flex items-center gap-2 text-[13.5px] font-semibold text-stone-700">
                {sec.title}
              </span>
              {openSection === sec.key ? <ChevUpIcon size={16} className="text-stone-400" /> : <ChevDownIcon size={16} className="text-stone-400" />}
            </button>

            {openSection === sec.key && (
              <div className="px-3.5 pb-4 pt-1 border-t border-stone-100">
                {sec.key === "basic" && (<>
                  <Field label="조사종명(국명)"><VoiceTextInput value={record.speciesNameKR} onChange={(v) => update({ speciesNameKR: v })} placeholder="예: 장수하늘소" /></Field>
                  <div className="grid grid-cols-2 gap-2">
                    <Field label="조사표번호"><TextInput value={record.surveyNo} onChange={(e) => update({ surveyNo: e.target.value })} /></Field>
                    <Field label="조사일자"><TextInput type="date" value={record.surveyDate} onChange={(e) => update({ surveyDate: e.target.value })} /></Field>
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <Field label="시작시각"><TextInput type="time" value={record.timeStart} onChange={(e) => update({ timeStart: e.target.value })} /></Field>
                    <Field label="종료시각"><TextInput type="time" value={record.timeEnd} onChange={(e) => update({ timeEnd: e.target.value })} /></Field>
                  </div>
                  <Field label="날씨"><ChipGroup options={["맑음", "흐림", "비"]} value={record.weather} onChange={(v) => update({ weather: v })} /></Field>
                  <Field label="기온(℃)"><TextInput value={record.tempC} onChange={(e) => update({ tempC: e.target.value })} /></Field>
                  <div className="grid grid-cols-2 gap-2">
                    <Field label="책임조사자"><TextInput value={record.surveyorLead} onChange={(e) => update({ surveyorLead: e.target.value })} /></Field>
                    <Field label="소속"><TextInput value={record.surveyorLeadOrg} onChange={(e) => update({ surveyorLeadOrg: e.target.value })} /></Field>
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <Field label="보조조사자"><TextInput value={record.surveyorAssist} onChange={(e) => update({ surveyorAssist: e.target.value })} /></Field>
                    <Field label="소속"><TextInput value={record.surveyorAssistOrg} onChange={(e) => update({ surveyorAssistOrg: e.target.value })} /></Field>
                  </div>
                </>)}

                {sec.key === "location" && (<>
                  {record.latMeasured && record.lngMeasured && (
                    <div className="flex items-center gap-1.5 text-[11.5px] text-emerald-700 bg-emerald-50 rounded-lg px-2.5 py-1.5 mb-3">
                      <MapPinIcon size={13} /> 사진 EXIF에서 GPS 좌표를 자동 추출했습니다.
                    </div>
                  )}
                  <div className="grid grid-cols-2 gap-2">
                    <Field label="개체군명"><TextInput value={record.populationName} onChange={(e) => update({ populationName: e.target.value })} /></Field>
                    <Field label="개체군 코드"><TextInput value={record.populationCode} onChange={(e) => update({ populationCode: e.target.value })} /></Field>
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <Field label="조사지역명"><TextInput value={record.regionName} onChange={(e) => update({ regionName: e.target.value })} /></Field>
                    <Field label="조사지역 코드"><TextInput value={record.regionCode} onChange={(e) => update({ regionCode: e.target.value })} /></Field>
                  </div>
                  <Field label="조사지 구분"><ChipGroup options={["필수", "신규", "미확인"]} value={record.siteType} onChange={(v) => update({ siteType: v })} /></Field>
                  {record.siteType === "미확인" && (
                    <div className="pl-3 border-l-2 border-stone-100 mb-3">
                      <Field label="확인 가능 여부"><ChipGroup options={["가능", "불가능"]} value={record.siteUnconfirmedOk} onChange={(v) => update({ siteUnconfirmedOk: v })} /></Field>
                      {record.siteUnconfirmedOk === "불가능" && (
                        <Field label="불가능 이유"><VoiceTextInput value={record.siteUnconfirmedReason} onChange={(v) => update({ siteUnconfirmedReason: v })} /></Field>
                      )}
                    </div>
                  )}
                  <Field label="행정구역 (동/리, 지번)"><TextInput value={record.admDistrict} onChange={(e) => update({ admDistrict: e.target.value })} /></Field>
                  <Field label="위치설명 (상세위치, 경로, 명칭)"><VoiceTextarea value={record.locationDesc} onChange={(v) => update({ locationDesc: v })} /></Field>
                  <div className="grid grid-cols-2 gap-2">
                    <Field label="기존 위도"><TextInput value={record.latExisting} onChange={(e) => update({ latExisting: e.target.value })} /></Field>
                    <Field label="기존 경도"><TextInput value={record.lngExisting} onChange={(e) => update({ lngExisting: e.target.value })} /></Field>
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <Field label="실측 위도"><TextInput value={record.latMeasured} onChange={(e) => update({ latMeasured: e.target.value })} placeholder="EXIF 자동 추출" /></Field>
                    <Field label="실측 경도"><TextInput value={record.lngMeasured} onChange={(e) => update({ lngMeasured: e.target.value })} placeholder="EXIF 자동 추출" /></Field>
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <Field label="좌표값 취득원"><Select options={COORD_SOURCES} value={record.coordSource} onChange={(e) => update({ coordSource: e.target.value })} /></Field>
                    <Field label="고도(m)"><TextInput value={record.altitude} onChange={(e) => update({ altitude: e.target.value })} /></Field>
                  </div>
                  {record.coordSource === "GPS" && (
                    <Field label="GPS 모델명"><TextInput value={record.coordSourceModel} onChange={(e) => update({ coordSourceModel: e.target.value })} /></Field>
                  )}
                </>)}

                {sec.key === "population" && (<>
                  <Field label="개체수"><ChipGroup options={COUNT_BUCKETS} value={record.countBucket} onChange={(v) => update({ countBucket: v })} /></Field>
                  <Field label="조사방법"><ChipGroup options={SURVEY_METHODS} value={record.surveyMethod} onChange={(v) => update({ surveyMethod: v })} /></Field>
                  {(record.surveyMethod === "유아등" || record.surveyMethod === "함정트랩" || record.surveyMethod === "말레이즈트랩" || record.surveyMethod === "기타") && (
                    <Field label="조사방법 상세 (먹이 등)"><VoiceTextInput value={record.surveyMethodDetail} onChange={(v) => update({ surveyMethodDetail: v })} /></Field>
                  )}
                  <Field label="성장단계별 개체수">
                    <div className="grid grid-cols-4 gap-1.5">
                      {GROWTH_STAGES.map((s) => (
                        <div key={s}><span className="text-[10.5px] text-stone-400">{s}</span><TextInput value={record.growthStageCounts[s]} onChange={(e) => updateGrowth(s, e.target.value)} /></div>
                      ))}
                    </div>
                  </Field>
                  <div className="grid grid-cols-2 gap-2">
                    <Field label="생식가능 개체 비율(%)"><TextInput value={record.reproRatio} onChange={(e) => update({ reproRatio: e.target.value })} /></Field>
                    <Field label="개체평균크기(cm)"><TextInput value={record.avgSizeCm} onChange={(e) => update({ avgSizeCm: e.target.value })} /></Field>
                  </div>
                </>)}

                {sec.key === "habitat" && (<>
                  <Field label="대분류">
                    <Select options={Object.keys(HABITAT)} value={record.habitatMajor} onChange={(e) => update({ habitatMajor: e.target.value, habitatMinor: "" })} />
                  </Field>
                  <Field label="중분류">
                    <Select options={HABITAT[record.habitatMajor] || []} value={record.habitatMinor} onChange={(e) => update({ habitatMinor: e.target.value })} />
                  </Field>
                  <Field label="서식지 비고"><VoiceTextarea value={record.habitatNote} onChange={(v) => update({ habitatNote: v })} /></Field>
                  <Field label="식생층위 구조 (교목층/아교목층/관목층/초본층)">
                    <VoiceTextarea value={record.vegetationLayers} onChange={(v) => update({ vegetationLayers: v })} placeholder="예: 교목층 신갈나무 70%, 관목층 진달래 20%, 초본층 30%" />
                  </Field>
                </>)}

                {sec.key === "threat" && (<>
                  <ThreatEditor label="1순위 요인" value={record.threats.primary} onChange={(v) => updateThreat("primary", v)} />
                  <ThreatEditor label="2순위 요인" value={record.threats.secondary} onChange={(v) => updateThreat("secondary", v)} />
                  <ThreatEditor label="3순위 요인" value={record.threats.tertiary} onChange={(v) => updateThreat("tertiary", v)} />
                </>)}

                {sec.key === "other" && (<>
                  <Field label="조사지 약도">
                    {record.latMeasured && record.lngMeasured ? (
                      <div className="rounded-lg overflow-hidden border border-stone-200">
                        <div className="relative w-full" style={{ aspectRatio: "1 / 1" }}>
                          <img src={osmTileUrl(parseFloat(record.latMeasured), parseFloat(record.lngMeasured))} alt="조사지 약도" className="w-full h-full object-cover" />
                          <div className="absolute w-3.5 h-3.5 -ml-1.75 -mt-3.5 rounded-full bg-red-600 border-2 border-white shadow"
                            style={{ left: `${(osmMarkerPx(parseFloat(record.latMeasured), parseFloat(record.lngMeasured)).left / 256) * 100}%`,
                                     top: `${(osmMarkerPx(parseFloat(record.latMeasured), parseFloat(record.lngMeasured)).top / 256) * 100}%` }} />
                        </div>
                        <div className="px-2.5 py-1.5 text-[11px] text-stone-400 bg-stone-50">{record.latMeasured}, {record.lngMeasured} 기준 자동 생성 (OpenStreetMap)</div>
                      </div>
                    ) : (
                      <div className="text-[12px] text-stone-400 bg-stone-50 rounded-lg px-3 py-4 text-center">GPS 좌표가 없습니다. 위치정보 섹션에서 좌표를 입력하면 자동으로 지도가 생성됩니다.</div>
                    )}
                  </Field>
                  <Field label="공동/동서출현종 (국명, 개체수)">
                    <div className="space-y-1.5">
                      {record.coOccurring.map((row, idx) => (
                        <div key={idx} className="flex gap-1.5 items-center">
                          <input value={row.name} onChange={(e) => updateCoOccurring(idx, "name", e.target.value)} placeholder="국명" className={inputCls + " flex-1"} />
                          <input value={row.count} onChange={(e) => updateCoOccurring(idx, "count", e.target.value)} placeholder="개체수" className={inputCls + " w-20"} />
                          <button onClick={() => removeCoOccurring(idx)} className="p-1.5 text-stone-300 hover:text-red-500"><XIcon size={14} /></button>
                        </div>
                      ))}
                      <button onClick={addCoOccurring} className="text-[12px] text-emerald-700 flex items-center gap-1 mt-1"><PlusIcon size={13} /> 출현종 추가</button>
                    </div>
                  </Field>
                  <Field label="코멘트 및 기타"><VoiceTextarea value={record.comment} onChange={(v) => update({ comment: v })} className={inputCls + " min-h-[80px]"} /></Field>
                </>)}
              </div>
            )}
          </section>
        ))}

        <button onClick={() => window.print()}
          className="w-full flex items-center justify-center gap-2 bg-stone-800 text-white text-[13.5px] font-medium py-3 rounded-lg mb-2">
          📄 현지조사표 출력 / PDF로 저장
        </button>
        <p className="text-[10.5px] text-stone-400 text-center mb-4">인쇄 화면에서 "PDF로 저장"을 선택하면 양식 그대로 PDF 파일로 받을 수 있습니다.</p>

        <PrintView record={record} />
      </main>
    </div>
  );
}

// ================= 최상위 App =================
function App() {
  const [records, setRecords] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [openId, setOpenId] = useState(null);
  const [saveWarning, setSaveWarning] = useState("");

  useEffect(() => {
    loadRecords().then((r) => { setRecords(r); setLoaded(true); });
  }, []);

  const openRecord = records.find((r) => r.id === openId);

  const persistAndSet = async (nextRecords, changedRecord) => {
    setRecords(nextRecords);
    if (changedRecord) {
      const ok = await saveRecord(changedRecord);
      setSaveWarning(ok ? "" : "저장 공간이 부족합니다. 사진을 일부 삭제하거나 야장을 정리해주세요.");
    }
  };

  const updateOpenRecord = (updater) => {
    setRecords((prev) => {
      const next = prev.map((r) => {
        if (r.id !== openId) return r;
        return typeof updater === "function" ? updater(r) : updater;
      });
      const changed = next.find((r) => r.id === openId);
      if (changed) saveRecord(changed).then((ok) => setSaveWarning(ok ? "" : "저장 공간이 부족합니다. 사진을 일부 삭제하거나 야장을 정리해주세요."));
      return next;
    });
  };

  const createNew = () => {
    const rec = emptyRecord();
    setRecords((prev) => [rec, ...prev]);
    saveRecord(rec);
    setOpenId(rec.id);
  };
  const deleteRecord = (id) => {
    setRecords((prev) => prev.filter((r) => r.id !== id));
    deleteRecordFromDB(id);
  };

  if (!loaded) {
    return <div className="min-h-screen flex items-center justify-center text-stone-400 text-[13px]">불러오는 중...</div>;
  }

  if (openRecord) {
    return (
      <>
        {saveWarning && <div className="bg-amber-100 text-amber-800 text-[11.5px] px-4 py-1.5 text-center">{saveWarning}</div>}
        <RecordEditor record={openRecord} onChange={updateOpenRecord} onBack={() => setOpenId(null)} />
      </>
    );
  }
  return (
    <>
      {saveWarning && <div className="bg-amber-100 text-amber-800 text-[11.5px] px-4 py-1.5 text-center">{saveWarning}</div>}
      <RecordList records={records} onOpen={setOpenId} onNew={createNew} onDelete={deleteRecord} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
